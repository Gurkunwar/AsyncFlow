services:
  db:
    image: postgres:15-alpine
    container_name: asyncflow_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=asyncflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: asyncflow_redis
    ports:
      - "6379:6379"

# volumes:
#   postgres_data:

volumes:
  postgres_data:
    external: true
    name: dailybot_postgres_data